services:

  # ─── Banco de Dados ─────────────────────────────────────────────────────────
  postgres:
    image: pgvector/pgvector:pg17
    container_name: pgvector-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: buscasemantica
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    ports:
      - "5432:5432"
    volumes:
      - pgvector_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d buscasemantica"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ─── Ollama (Llama 3.2 local) ────────────────────────────────────────────────
  ollama:
    image: ollama/ollama:0.5.4
    container_name: ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    environment:
      OLLAMA_KEEP_ALIVE: "24h"
    entrypoint: ["/bin/sh", "-c", "ollama serve & sleep 5 && ollama pull nomic-embed-text && wait"]
    healthcheck:
      test: ["CMD-SHELL", "ollama list 2>/dev/null | grep -q 'nomic-embed-text' || exit 1"]
      interval: 30s
      timeout: 15s
      retries: 15
      start_period: 300s

  # ─── API Embeddings (microserviço Llama) ─────────────────────────────────────
  api-embeddings:
    build:
      context: ./api-embeddings
      dockerfile: Dockerfile
    container_name: api-embeddings
    restart: unless-stopped
    ports:
      - "8081:8080"
    environment:
      OLLAMA_BASE_URL: http://ollama:11434
      OLLAMA_EMBEDDING_MODEL: nomic-embed-text
      SERVER_PORT: 8080
    depends_on:
      ollama:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # ─── API Busca Semântica — Instância 1 ───────────────────────────────────────
  api-1:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: api-busca-semantica-1
    restart: unless-stopped
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: buscasemantica
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      EMBEDDING_SERVICE_URL: http://api-embeddings:8080
      EMBEDDING_MODEL: nomic-embed-text
      SERVER_PORT: 8080
    depends_on:
      postgres:
        condition: service_healthy
      api-embeddings:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # ─── API Busca Semântica — Instância 2 (redundância) ─────────────────────────
  api-2:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: api-busca-semantica-2
    restart: unless-stopped
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: buscasemantica
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      EMBEDDING_SERVICE_URL: http://api-embeddings:8080
      EMBEDDING_MODEL: nomic-embed-text
      SERVER_PORT: 8080
    depends_on:
      postgres:
        condition: service_healthy
      api-embeddings:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # ─── Nginx Load Balancer ─────────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: nginx-lb
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      api-1:
        condition: service_healthy
      api-2:
        condition: service_healthy

volumes:
  pgvector_data:
    driver: local
  ollama_data:
    driver: local
