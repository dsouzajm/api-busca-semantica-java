services:

  # ─── Banco de Dados ─────────────────────────────────────────────────────────
  postgres:
    image: pgvector/pgvector:pg17
    container_name: pgvector-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: buscasemantica
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    ports:
      - "5432:5432"
    volumes:
      - pgvector_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d buscasemantica"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ─── Ollama (LLM local — Llama 3.2) ─────────────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    environment:
      OLLAMA_KEEP_ALIVE: "24h"
    # Inicia o servidor e baixa o modelo Llama 3.2 1B na primeira execução
    entrypoint: ["/bin/sh", "-c", "ollama serve & sleep 5 && ollama pull llama3.2:1b && wait"]
    healthcheck:
      test: ["CMD-SHELL", "ollama list 2>/dev/null | grep -q 'llama3.2' || exit 1"]
      interval: 30s
      timeout: 15s
      retries: 15
      start_period: 300s

  # ─── Instância 1 da API ─────────────────────────────────────────────────────
  api-1:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: api-busca-semantica-1
    restart: unless-stopped
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: buscasemantica
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      OLLAMA_BASE_URL: http://ollama:11434
      SERVER_PORT: 8080
    depends_on:
      postgres:
        condition: service_healthy
      ollama:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # ─── Instância 2 da API (Redundância) ───────────────────────────────────────
  api-2:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: api-busca-semantica-2
    restart: unless-stopped
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: buscasemantica
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      OLLAMA_BASE_URL: http://ollama:11434
      SERVER_PORT: 8080
    depends_on:
      postgres:
        condition: service_healthy
      ollama:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # ─── Nginx Load Balancer ─────────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: nginx-lb
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      api-1:
        condition: service_healthy
      api-2:
        condition: service_healthy

volumes:
  pgvector_data:
    driver: local
  ollama_data:
    driver: local
